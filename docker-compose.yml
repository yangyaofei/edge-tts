services:
  # -----------------------------------------------------------------------
  # qwen3-tts-pytorch — Python TTS server (faster-qwen3-tts + CUDA Graph)
  # RTF ~1.49 on GTX 1080 Ti, TTFA ~0.48s
  # -----------------------------------------------------------------------
  qwen3-tts-server:
    build:
      context: ./docker/qwen3-tts-pytorch
    image: edge-tts-qwen3-pytorch:latest
    container_name: edge-tts-qwen3-server
    ports:
      - "9880:9880"
    volumes:
      # Mount HuggingFace model cache (auto-downloads on first start if empty)
      - ./models:/models
      # Mount reference audio files for voice cloning
      - ./docker/qwen3-tts-pytorch/ref_audios:/app/ref_audios:ro
    environment:
      - TTS_MODEL=Qwen/Qwen3-TTS-12Hz-1.7B-Base
      - TTS_DEVICE=cuda
      - PORT=9880
      - HF_HOME=/models/hf_cache
      - TTS_REF_AUDIO=/app/ref_audios/ref_zh.wav
      - TTS_REF_TEXT=人工智能技术在过去几年里取得了巨大的进步，尤其是在自然语言处理和大语言模型方面。
      - TTS_XVEC_ONLY=0
      - TTS_REF_AUDIO_DIR=/app/ref_audios
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
    restart: unless-stopped

  # -----------------------------------------------------------------------
  # backend — main application backend
  # -----------------------------------------------------------------------
  backend:
    build:
      context: ./backend
    image: ghcr.io/yangyaofei/edge-tts-backend:latest
    container_name: edge-tts-backend
    ports:
      - "8900:8000"
    volumes:
      - ./config:/app/config
    environment:
      - QWEN3_TTS_SERVER_URL=http://qwen3-tts-server:9880
    depends_on:
      qwen3-tts-server:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
    restart: unless-stopped
