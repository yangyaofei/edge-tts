services:
  # -----------------------------------------------------------------------
  # qwen3-tts-pytorch — Python TTS server (faster-qwen3-tts + CUDA Graph)
  # RTF ~1.49 on GTX 1080 Ti, TTFA ~0.48s
  # -----------------------------------------------------------------------
  qwen3-tts-server:
    build:
      context: ./docker/qwen3-tts-pytorch
    image: edge-tts-qwen3-pytorch:latest
    container_name: edge-tts-qwen3-server
    ports:
      - "9880:9880"
    volumes:
      # Mount HuggingFace model cache (auto-downloads on first start if empty)
      - ./models:/models
    environment:
      - TTS_MODEL=Qwen/Qwen3-TTS-12Hz-1.7B-Base
      - TTS_DEVICE=cuda
      - PORT=9880
      - HF_HOME=/models/hf_cache
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
    restart: unless-stopped

  # -----------------------------------------------------------------------
  # backend — main application backend
  # -----------------------------------------------------------------------
  backend:
    build:
      context: ./backend
    image: ghcr.io/yangyaofei/edge-tts-backend:latest
    container_name: edge-tts-backend
    ports:
      - "8900:8000"
    volumes:
      - ./config:/app/config
    environment:
      - QWEN3_TTS_SERVER_URL=http://qwen3-tts-server:9880
    depends_on:
      qwen3-tts-server:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
    restart: unless-stopped
