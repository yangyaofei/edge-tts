services:
  # -----------------------------------------------------------------------
  # qwen3-tts-server — C++ HTTP server wrapping qwen3-tts.cpp
  # -----------------------------------------------------------------------
  qwen3-tts-server:
    build:
      context: ./docker/qwen3-tts-server
    image: edge-tts-qwen3-tts-server:latest
    container_name: edge-tts-qwen3-server
    ports:
      - "9880:9880"
    volumes:
      # Mount GGUF models into /models
      # Expected files:
      #   qwen3-tts-0.6b-q8_0.gguf  (or qwen3-tts-0.6b-f16.gguf)
      #   qwen3-tts-tokenizer-f16.gguf
      - ./models:/models:ro
    command: ["--model-dir", "/models", "--port", "9880"]
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
    restart: unless-stopped

  # -----------------------------------------------------------------------
  # backend — main application backend (placeholder)
  # -----------------------------------------------------------------------
  backend:
    build:
      context: ./backend
    image: ghcr.io/yangyaofei/edge-tts-backend:latest
    container_name: edge-tts-backend
    ports:
      - "8000:8000"
    volumes:
      # Map local config directory for persistent settings
      # config.env will be generated in ./config/config.env if it doesn't exist
      - ./config:/app/config
    #environment:
    #  # SECRET_KEY will be loaded from the mounted .env file
    depends_on:
      - qwen3-tts-server
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
    restart: unless-stopped
